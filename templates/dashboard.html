<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #fff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            color: #34495e;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .btn {
            text-decoration: none;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 8px;
            background-color: #e74c3c;
            color: #fff;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Welcome, {{ request.user.username }}!</h2>
        <p>You are logged in.</p>
        <a href="{% url 'logout' %}" class="btn">Logout</a>
    </div>
</body>
</html>
